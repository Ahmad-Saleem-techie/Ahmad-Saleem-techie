updates:
  # ── Keep GitHub Actions up to date automatically ──────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
      timezone: "UTC"
    # Group all Action updates into one PR to reduce noise
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "github-actions"
    # Only open PRs for security updates automatically; others need review
    open-pull-requests-limit: 5
